specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Deno
providerId: deno
publisherName: Deno Land Inc.
serviceCategory: Edge Compute / Serverless Runtime
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Edge Compute
  - Serverless
  - JavaScript
  - Runtime
  - TypeScript
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for Deno Deploy: tiered subscription (Free / Pro $20 / Builder $200
  / Enterprise) with included monthly quotas plus pay-as-you-go overage on requests, bandwidth, CPU/memory
  time, and KV storage and operations.'
sources:
  - https://deno.com/pricing
  - https://docs.deno.com/deploy/manual/pricing-and-limits
principles:
  - name: Visibility
    description: Use the Deno Deploy dashboard's usage and billing pages plus the alert-threshold and
      hard spending-limit controls to monitor request, bandwidth, CPU/memory, and KV consumption per organization
      in near real time.
  - name: Allocation
    description: Tag spend by Deno organization, project, and deployment. Use separate organizations per
      cost-center where strict allocation is needed since billing rolls up at the org level.
  - name: Optimization
    description: Right-size memory and isolate behavior, cache aggressively at the edge to reduce request
      counts, compress responses to lower egress GB, and prefer KV reads (cheaper) over writes; consolidate
      deployments to stay inside the included CPU/memory-time quotas.
  - name: Accountability
    description: Set hard spending limits per organization to bound overage from traffic spikes, and assign
      a billing owner for each Deploy organization in the dashboard's billing settings.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Tiered Subscription + Pay-As-You-Go Overage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Deno Deploy
  ServiceCategory: Edge Compute / Serverless Runtime
  ProviderName: Deno
  PublisherName: Deno Land Inc.
  InvoiceIssuerName: Deno Land Inc.
  PricingCategory: Subscription + Usage-Based
  PricingUnit: varies
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: subscription_fee
    description: Monthly Pro / Builder / Enterprise subscription fee
    unit: month
    aggregation: sum
    dimensions:
      - plan
      - organization
  - name: requests
    description: HTTP requests served by deployments
    unit: request
    aggregation: sum
    dimensions:
      - organization
      - deployment
      - region
  - name: bandwidth_egress
    description: Outbound network bandwidth from deployments
    unit: GB
    aggregation: sum
    dimensions:
      - organization
      - deployment
      - region
  - name: cpu_time
    description: Wall-clock CPU time consumed by isolates
    unit: hour
    aggregation: sum
    dimensions:
      - organization
      - deployment
  - name: memory_time
    description: Memory-time product (memory allocation x duration)
    unit: GB-hour
    aggregation: sum
    dimensions:
      - organization
      - deployment
  - name: kv_storage
    description: Resident KV storage volume
    unit: GB
    aggregation: max
    dimensions:
      - organization
  - name: kv_reads
    description: KV read operations
    unit: read
    aggregation: sum
    dimensions:
      - organization
  - name: kv_writes
    description: KV write operations
    unit: write
    aggregation: sum
    dimensions:
      - organization
  - name: volume_storage
    description: Resident volume storage
    unit: GB-month
    aggregation: max
    dimensions:
      - organization
apis:
  - name: Deno Deploy REST API
    baseURL: https://api.deno.com/v1
    tags:
      - Deployment
      - Edge
      - Management
      - Serverless
    serviceName: Deno Deploy REST API
    serviceCategory: API
  - name: Deno Deploy API V2
    baseURL: https://api.deno.com/v2
    tags:
      - Deployment
      - Edge
      - Management
      - Serverless
    serviceName: Deno Deploy API V2
    serviceCategory: API
  - name: Deno KV API
    baseURL: https://api.deno.com
    tags:
      - Database
      - Edge
      - Key-Value
      - Storage
    serviceName: Deno KV API
    serviceCategory: API
  - name: Deno Subhosting API
    baseURL: https://api.deno.com/v1
    tags:
      - Deployment
      - Multi-Tenant
      - Serverless
      - Subhosting
    serviceName: Deno Subhosting API
    serviceCategory: API
unitEconomics:
  - name: Cost per 1M Requests
    metric: billed_cost / (requests / 1000000)
    target: '$2 above included; $0 within plan quota'
  - name: Cost per GB Egress
    metric: bandwidth_cost / bandwidth_gb
    target: '$0.50 above included'
  - name: Cost per Active Deployment
    metric: billed_cost / active_deployments
    target: TBD
maintainers:
