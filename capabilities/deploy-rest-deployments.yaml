  - type: http
    namespace: deploy-rest-deployments
    baseUri: https://api.deno.com/v1
    description: Deno Deploy REST API — Deployments business capability. Self-contained, no shared references.
    resources:
    - name: deployments-deploymentId
      path: /deployments/{deploymentId}
      operations:
      - name: getdeployment
        method: GET
        description: Get deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletedeployment
        method: DELETE
        description: Delete deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deployments-deploymentId-app_logs
      path: /deployments/{deploymentId}/app_logs
      operations:
      - name: getapplogs
        method: GET
        description: Get application logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: Full-text search query to filter log messages
        - name: level
          in: query
          type: string
          description: Filter logs by severity level
        - name: region
          in: query
          type: string
          description: Filter logs by the deployment region that emitted them
        - name: since
          in: query
          type: string
          description: Return logs after this RFC 3339 timestamp
        - name: until
          in: query
          type: string
          description: Return logs before this RFC 3339 timestamp; omit to stream
        - name: limit
          in: query
          type: integer
          description: Maximum number of log entries to return
        - name: sort
          in: query
          type: string
          description: Field to sort results by
        - name: order
          in: query
          type: string
          description: Sort direction
        - name: cursor
          in: query
          type: string
          description: Pagination cursor from a previous response Link header
    - name: deployments-deploymentId-build_logs
      path: /deployments/{deploymentId}/build_logs
      operations:
      - name: getbuildlogs
        method: GET
        description: Get build logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deployments-deploymentId-redeploy
      path: /deployments/{deploymentId}/redeploy
      operations:
      - name: redeploydeployment
        method: POST
        description: Redeploy deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: projects-projectId-deployments
