naftiko: 1.0.0-alpha2
info:
  label: Deno Subhosting API — Organizations
  description: 'Deno Subhosting API — Organizations. 2 operations. Lead operation: Get organization. Self-contained Naftiko
    capability covering one Deno business surface.'
  tags:
  - Deno
  - Organizations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DENO_API_KEY: DENO_API_KEY
capability:
  consumes:
  - type: http
    namespace: subhosting-organizations
    baseUri: https://api.deno.com/v1
    description: Deno Subhosting API — Organizations business capability. Self-contained, no shared references.
    resources:
    - name: organizations-organizationId
      path: /organizations/{organizationId}
      operations:
      - name: getorganization
        method: GET
        description: Get organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: organizations-organizationId-analytics
      path: /organizations/{organizationId}/analytics
      operations:
      - name: getorganizationanalytics
        method: GET
        description: Get organization analytics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: since
          in: query
          type: string
          description: Start of the time range in RFC 3339 format
          required: true
        - name: until
          in: query
          type: string
          description: End of the time range in RFC 3339 format
          required: true
    authentication:
      type: bearer
      token: '{{env.DENO_API_KEY}}'
  exposes:
  - type: rest
    namespace: subhosting-organizations-rest
    port: 8080
    description: REST adapter for Deno Subhosting API — Organizations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/organizations/{organizationid}
      name: organizations-organizationid
      description: REST surface for organizations-organizationId.
      operations:
      - method: GET
        name: getorganization
        description: Get organization
        call: subhosting-organizations.getorganization
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{organizationid}/analytics
      name: organizations-organizationid-analytics
      description: REST surface for organizations-organizationId-analytics.
      operations:
      - method: GET
        name: getorganizationanalytics
        description: Get organization analytics
        call: subhosting-organizations.getorganizationanalytics
        with:
          since: rest.since
          until: rest.until
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: subhosting-organizations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Deno Subhosting API — Organizations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-organization
      description: Get organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: subhosting-organizations.getorganization
      outputParameters:
      - type: object
        mapping: $.
    - name: get-organization-analytics
      description: Get organization analytics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: subhosting-organizations.getorganizationanalytics
      with:
        since: tools.since
        until: tools.until
      outputParameters:
      - type: object
        mapping: $.
