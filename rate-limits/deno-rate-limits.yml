specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Deno
providerId: deno
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Edge Compute
  - Serverless
  - JavaScript
  - Runtime
  - Rate Limiting
  - Quotas
  - Throttling
description: Deno Deploy enforces per-isolate resource constraints (memory, deployment size) plus monthly
  quotas (requests, bandwidth, CPU time, memory time, KV reads/writes/storage) per organization rather
  than fixed per-second request rates. Free hits hard caps; Pro and Builder bill overage at published
  per-unit rates; Enterprise quotas are negotiated.
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: free
    name: Free Tier Monthly Request Quota
    scope: organization
    metric: requests_per_month
    limit: 1000000
    timeFrame: month
    applies:
      - Deno Deploy REST API
      - Deno Deploy API V2
      - Deno KV API
      - Deno Subhosting API
  - tier: free
    name: Free Tier Egress Bandwidth Quota
    scope: organization
    metric: gb_per_month
    limit: 20
    timeFrame: month
    applies:
      - Deno Deploy REST API
      - Deno Deploy API V2
  - tier: free
    name: Free Tier CPU Time Quota
    scope: organization
    metric: hours_per_month
    limit: 15
    timeFrame: month
    applies:
      - Deno Deploy REST API
      - Deno Deploy API V2
  - tier: pro
    name: Pro Tier Monthly Request Quota
    scope: organization
    metric: requests_per_month
    limit: 5000000
    timeFrame: month
    applies:
      - Deno Deploy REST API
      - Deno Deploy API V2
      - Deno KV API
      - Deno Subhosting API
  - tier: builder
    name: Builder Tier Monthly Request Quota
    scope: organization
    metric: requests_per_month
    limit: 20000000
    timeFrame: month
    applies:
      - Deno Deploy REST API
      - Deno Deploy API V2
      - Deno KV API
      - Deno Subhosting API
  - tier: all
    name: Per-Isolate Memory Cap
    scope: deployment
    metric: memory_mb
    limit: 512
    applies:
      - Deno Runtime
      - Deno Deploy REST API
      - Deno Deploy API V2
  - tier: all
    name: Deployment Bundle Size
    scope: deployment
    metric: bytes
    limit: 1073741824
    applies:
      - Deno Deploy REST API
      - Deno Deploy API V2
      - Deno Subhosting API
  - tier: enterprise
    name: Enterprise Negotiated Quota
    scope: contract
    metric: varies
    limit: -1
    applies:
      - Deno Deploy REST API
      - Deno Deploy API V2
      - Deno KV API
      - Deno Subhosting API
policies:
  - name: Quota-Based Throttling
    description: Throttling is enforced via monthly organization-scoped quotas (requests, bandwidth, CPU
      time, memory time, KV operations and storage), not fixed per-second RPS. Free is hard-capped; Pro
      and Builder bill overage at published rates.
  - name: Spending Limits
    description: Organizations can configure alert thresholds and hard spending limits in the Deno Deploy
      dashboard to bound overage charges from traffic spikes.
  - name: TLS Egress Restriction
    description: Direct Deno.connect to port 443 is prohibited; deployments must use Deno.connectTls or
      fetch to make outbound TLS calls.
  - name: Acceptable Use
    description: Deployments are bound by Deno's acceptable use policy; sustained abuse of shared infrastructure
      may be throttled or suspended.
  - name: Beta SLA
    description: Public-beta features carry no uptime guarantees. Enterprise plans get a 99.95% SLA.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
